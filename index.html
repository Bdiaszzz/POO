<!DOCTYPE html>
<html lang="pt-br   ">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador de parquímetro </title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>
  <div class="box">
    <h1>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
        <path
          d="M400 32H48C21.5 32 0 53.5 0 80v352c0 26.5 21.5 48 48 48h352c26.5 0 48-21.5 48-48V80c0-26.5-21.5-48-48-48zM240 320h-48v48c0 8.8-7.2 16-16 16h-32c-8.8 0-16-7.2-16-16V144c0-8.8 7.2-16 16-16h96c52.9 0 96 43.1 96 96s-43.1 96-96 96zm0-128h-48v64h48c17.6 0 32-14.4 32-32s-14.4-32-32-32z" />
      </svg>
      Parquímetro
    </h1>
    <div class="tabela-precos">
      <span class="titulo">Tempo</span>
      <span class="titulo">Valor</span>
      <span>30min</span>
      <span>R$ 1,00</span>
      <span>60min</span>
      <span>R$ 1,75</span>
      <span>120min</span>
      <span>R$ 3,00</span>
    </div>
    <p>Valor</p>
    <input type="number" id="valor" placeholder="Digite o valor em reais">
    <p>Tempo</p>
    <input type="text" id="tempo" placeholder="Tempo em minutos" readonly>
    <p><button onclick="calcularTempo()">Calcular Tempo</button></p>
    <p id="mensagem-troco" style="font-size: 14px; color: #ffeb3b;"></p>
  </div>
</body>

</html>
